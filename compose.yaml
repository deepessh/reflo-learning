name: reflo-local

services:
  rds:
    image: postgres:16.9-bookworm@sha256:253815cf7579ffa05e1673d92e78d37273e61be0e4414e9a1449337d7925be94
    environment:
      POSTGRES_DB: reflo
      POSTGRES_PASSWORD: ${REFLO_LOCAL_RDS_PASSWORD:?generated by scripts/local-stack.sh}
      POSTGRES_USER: reflo
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready --dbname=$${POSTGRES_DB} --username=$${POSTGRES_USER}",
        ]
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 5s
    ports:
      - "127.0.0.1:${REFLO_LOCAL_RDS_PORT:-55432}:5432"
    stop_grace_period: 30s
    volumes:
      - rds-data:/var/lib/postgresql/data

  vector:
    image: pgvector/pgvector:0.8.1-pg16-bookworm@sha256:33198da2828a14c30348d2ccb4750833d5ed9a44c88d840a0e523d7417120337
    environment:
      POSTGRES_DB: reflo_vectors
      POSTGRES_PASSWORD: ${REFLO_LOCAL_VECTOR_PASSWORD:?generated by scripts/local-stack.sh}
      POSTGRES_USER: reflo_vectors
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready --dbname=$${POSTGRES_DB} --username=$${POSTGRES_USER}",
        ]
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 5s
    ports:
      - "127.0.0.1:${REFLO_LOCAL_VECTOR_PORT:-55433}:5432"
    stop_grace_period: 30s
    volumes:
      - vector-data:/var/lib/postgresql/data

volumes:
  rds-data:
  vector-data:
