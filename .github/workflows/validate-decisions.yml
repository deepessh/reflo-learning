name: Validate ADR governance

on:
  pull_request:
  push:
    branches:
      - main
    paths:
      - AGENTS.md
      - README.md
      - .nvmrc
      - package.json
      - turbo.json
      - prds/reflo-prd.md
      - scripts/validate_adrs.py
      - scripts/validate_architecture.py
      - scripts/validate_problem_docs.py
      - scripts/requirements-governance.txt
      - scripts/test_validate_adrs.py
      - scripts/test_validate_architecture.py
      - scripts/test_validate_problem_docs.py
      - scripts/test_adr_skills.py
      - scripts/fixtures/adr-skills/**
      - .adr-governance.yaml
      - docs/adrs/**
      - docs/architecture.md
      - docs/problems/**
      - skills/writing-adrs/**
      - skills/renumber-adr/**
      - scripts/agent_improvements.py
      - scripts/work-item.sh
      - scripts/doctor.sh
      - scripts/toolchain-versions.sh
      - scripts/check-required-checks.mjs
      - scripts/check-required-checks.test.mjs
      - scripts/check-toolchain-policy.mjs
      - scripts/check-toolchain-policy.test.mjs
      - scripts/doctor.test.mjs
      - scripts/test_work_item.py
      - scripts/test_agent_improvements.py
      - packages/db/README.md
      - packages/db/package.json
      - packages/db/scripts/dump-schema-from-container.sh
      - packages/db/scripts/pg-dump-from-container.sh
      - packages/db/test/pg-dump-from-container.test.mjs
      - packages/db/test/schema.test.mjs
      - .github/required-checks.json
      - .github/workflows/ci.yml
      - .github/workflows/validate-decisions.yml

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
      - name: Install pinned governance dependency
        run: python3 -m pip install --requirement scripts/requirements-governance.txt
      - name: Test governance tooling
        run: |
          python3 -m unittest scripts/test_validate_adrs.py scripts/test_validate_architecture.py scripts/test_validate_problem_docs.py scripts/test_adr_skills.py scripts/test_work_item.py scripts/test_agent_improvements.py
          node --test scripts/check-required-checks.test.mjs scripts/check-toolchain-policy.test.mjs scripts/doctor.test.mjs
      - name: Check shell helper syntax
        run: bash -n scripts/work-item.sh scripts/doctor.sh packages/db/scripts/dump-schema-from-container.sh packages/db/scripts/pg-dump-from-container.sh
      - name: Validate pinned toolchain policy
        run: node scripts/check-toolchain-policy.mjs
      - name: Validate required PR checks against repository rules
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/check-required-checks.mjs --check-github
      - name: Validate structure and GitHub references
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CURRENT_PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            python3 scripts/validate_adrs.py --base-ref HEAD^ --check-links --current-pr-number "$CURRENT_PR_NUMBER"
            python3 skills/writing-adrs/scripts/allocate_adr_number.py \
              --target-ref HEAD^ \
              --base-branch "$GITHUB_BASE_REF" \
              --current-pr-number "$CURRENT_PR_NUMBER" \
              --check-merge-order
          else
            python3 scripts/validate_adrs.py --base-ref HEAD^ --check-links
          fi
          python3 scripts/validate_architecture.py
          python3 scripts/validate_problem_docs.py
